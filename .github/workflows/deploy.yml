name: Deploy Shinylive to GitHub Pages

# Construit l'application en site statique Shinylive (R compile en WebAssembly,
# execute dans le navigateur) et la publie sur GitHub Pages a chaque push.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises pour publier sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule execution a la fois ; on n'annule pas un deploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install shinylive
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shinylive

      - name: Verifier la presence des donnees .rds
        shell: bash
        run: |
          if ! ls app_shiny/output/data_modif/*.rds >/dev/null 2>&1; then
            echo "::error::Aucun fichier .rds trouve dans app_shiny/output/data_modif/."
            echo "Lancez d'abord 'Rscript scripts/convert_csv_to_rds.R' puis committez les .rds."
            exit 1
          fi

      - name: Export Shinylive
        shell: Rscript {0}
        run: |
          shinylive::export("app_shiny", "site")

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
